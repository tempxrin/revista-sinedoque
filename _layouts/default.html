<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != 'Início' %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,700;1,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="feed" type="application/atom+xml" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>

  {% if page.layout == 'post' %}
    <div class="reading-progress" id="readingProgress"></div>
  {% endif %}

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  {% if page.layout == 'post' %}
  <script>
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('readingProgress').style.width = progress + '%';
    });
  </script>
  {% endif %}

</body>
</html>
