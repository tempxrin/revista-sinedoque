<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="logo">
      <span class="logo-icon">&#9670;</span>
      <span class="logo-text">Revista<br><strong>Tempovani</strong></span>
    </a>
    <nav class="header-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Início</a>
      <a href="{{ '/artigos/' | relative_url }}"{% if page.url contains '/artigos/' %} class="active"{% endif %}>Artigos</a>
      <a href="{{ '/sobre/' | relative_url }}"{% if page.url == '/sobre/' %} class="active"{% endif %}>Sobre</a>
    </nav>
    <button class="menu-toggle" aria-label="Menu">&#9776;</button>
  </div>
</header>

<script>
  document.querySelector('.menu-toggle')?.addEventListener('click', function() {
    document.querySelector('.header-nav').classList.toggle('open');
  });
</script>
