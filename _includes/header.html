<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="logo">
      <span class="logo-icon">&#9670;</span>
      <span class="logo-text">Revista<br><strong>Tempovani</strong></span>
    </a>
    <nav class="header-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Início</a>
      <a href="{{ '/categoria/ensaio/' | relative_url }}"{% if page.url contains '/ensaio/' %} class="active"{% endif %}>Ensaios</a>
      <a href="{{ '/categoria/cronica/' | relative_url }}"{% if page.url contains '/cronica/' %} class="active"{% endif %}>Crônicas</a>
      <a href="{{ '/categoria/politica/' | relative_url }}"{% if page.url contains '/politica/' %} class="active"{% endif %}>Política</a>
      <a href="{{ '/categoria/cultura/' | relative_url }}"{% if page.url contains '/cultura/' %} class="active"{% endif %}>Cultura</a>
      <a href="{{ '/categoria/ciencia/' | relative_url }}"{% if page.url contains '/ciencia/' %} class="active"{% endif %}>Ciência</a>
      <a href="{{ '/artigos/' | relative_url }}"{% if page.url == '/artigos/' %} class="active"{% endif %}>Arquivo</a>
    </nav>
    <button class="menu-toggle" aria-label="Menu">Menu</button>
  </div>
</header>
