<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <style>
    .logo-diamond { fill: #d4785c; }
    .logo-revista { font-family: Georgia, 'Times New Roman', serif; font-size: 14px; fill: #ffffff; letter-spacing: 4px; }
    .logo-tempovani { font-family: 'Playfair Display', Georgia, serif; font-size: 36px; fill: #ffffff; font-weight: 700; letter-spacing: 2px; }
  </style>
  <rect x="30" y="20" width="8" height="8" class="logo-diamond" transform="rotate(45 34 24)" rx="1"/>
  <text x="50" y="42" class="logo-revista">REVISTA</text>
  <text x="50" y="82" class="logo-tempovani">TEMPOVANI</text>
</svg>
