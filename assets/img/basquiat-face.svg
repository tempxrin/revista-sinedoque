<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f0eb"/>
  <!-- Face outline -->
  <path d="M250 150 L200 350 L220 500 L400 540 L580 500 L600 350 L550 150" stroke="#1a1a1a" stroke-width="7" fill="none" stroke-linejoin="round"/>
  <path d="M250 150 L400 180 L550 150" stroke="#1a1a1a" stroke-width="7" fill="none" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="320" cy="300" r="35" stroke="#1a1a1a" stroke-width="6" fill="none"/>
  <circle cx="480" cy="300" r="35" stroke="#1a1a1a" stroke-width="6" fill="none"/>
  <circle cx="320" cy="300" r="12" fill="#1a1a1a"/>
  <circle cx="480" cy="300" r="12" fill="#1a1a1a"/>
  <!-- Eyebrows -->
  <path d="M270 240 L370 230" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <path d="M430 230 L530 240" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M400 300 L380 380 L420 380" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M330 430 Q400 460 470 430" stroke="#1a1a1a" stroke-width="5" fill="none"/>
  <line x1="330" y1="430" x2="330" y2="450" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="470" y1="430" x2="470" y2="450" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Teeth -->
  <line x1="350" y1="440" x2="350" y2="455" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="370" y1="445" x2="370" y2="460" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="430" y1="445" x2="430" y2="460" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="450" y1="440" x2="450" y2="455" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Scribble text -->
  <text x="240" y="85" font-family="Courier,monospace" font-size="22" fill="#1a1a1a" font-weight="bold" transform="rotate(-3 240 85)">ASYLUM</text>
  <text x="480" y="550" font-family="Courier,monospace" font-size="18" fill="#d4785c" transform="rotate(2 480 550)">UNTITLED</text>
  <!-- Crown on head -->
  <path d="M330 150 L310 80 L350 110 L400 60 L450 110 L490 80 L470 150" stroke="#d4785c" stroke-width="5" fill="none" stroke-linejoin="round"/>
  <!-- Doodle crosses -->
  <line x1="100" y1="200" x2="150" y2="250" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="150" y1="200" x2="100" y2="250" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="650" y1="200" x2="700" y2="250" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="700" y1="200" x2="650" y2="250" stroke="#1a1a1a" stroke-width="3"/>
</svg>
