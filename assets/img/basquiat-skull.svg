<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f0eb"/>
  <!-- Skull outline -->
  <path d="M250 160 C180 200 170 320 190 400 L220 480 L400 520 L580 480 L610 400 C630 320 620 200 550 160 C500 130 500 100 480 80 L400 70 L320 80 C300 100 300 130 250 160 Z" stroke="#1a1a1a" stroke-width="6" fill="none" stroke-linejoin="round"/>
  <!-- Eyes -->
  <ellipse cx="320" cy="260" rx="30" ry="40" stroke="#1a1a1a" stroke-width="5" fill="none"/>
  <ellipse cx="480" cy="260" rx="30" ry="40" stroke="#1a1a1a" stroke-width="5" fill="none"/>
  <ellipse cx="320" cy="260" rx="12" ry="18" fill="#1a1a1a"/>
  <ellipse cx="480" cy="260" rx="12" ry="18" fill="#1a1a1a"/>
  <!-- Nose cavity -->
  <path d="M380 340 L370 390 L430 390 L420 340" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linejoin="round"/>
  <!-- Mouth / teeth -->
  <path d="M300 440 L500 440" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="325" y1="440" x2="325" y2="470" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="350" y1="440" x2="350" y2="475" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="375" y1="440" x2="375" y2="470" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="400" y1="440" x2="400" y2="480" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="425" y1="440" x2="425" y2="470" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="450" y1="440" x2="450" y2="475" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="475" y1="440" x2="475" y2="470" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Jaw line -->
  <path d="M270 380 C250 430 260 490 280 500" stroke="#1a1a1a" stroke-width="4" fill="none"/>
  <path d="M530 380 C550 430 540 490 520 500" stroke="#1a1a1a" stroke-width="4" fill="none"/>
  <!-- Text -->
  <text x="260" y="90" font-family="Courier,monospace" font-size="20" fill="#1a1a1a" font-weight="bold">MOUTH</text>
  <text x="490" y="560" font-family="Georgia,serif" font-size="26" fill="#d4785c" font-style="italic">Mortal</text>
  <!-- Cross bones -->
  <line x1="140" y1="420" x2="200" y2="480" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="420" x2="140" y2="480" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="600" y1="420" x2="660" y2="480" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="660" y1="420" x2="600" y2="480" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Crown on top -->
  <path d="M350 70 L340 20 L370 35 L400 0 L430 35 L460 20 L450 70" stroke="#d4785c" stroke-width="4" fill="none" stroke-linejoin="round"/>
  <!-- Circles -->
  <circle cx="100" cy="200" r="25" stroke="#1a1a1a" stroke-width="3" fill="none"/>
  <circle cx="700" cy="200" r="25" stroke="#1a1a1a" stroke-width="3" fill="none"/>
  <line x1="80" y1="200" x2="120" y2="200" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="680" y1="200" x2="720" y2="200" stroke="#1a1a1a" stroke-width="3"/>
</svg>
